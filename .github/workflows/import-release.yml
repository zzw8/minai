name: Import MinAI release

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download cleaned release package
        run: |
          curl -fsSL "https://ai.abits.top/minai-release-import.zip" -o /tmp/minai.zip
          rm -rf /tmp/minai
          mkdir -p /tmp/minai
          python3 - <<'PY'
          import pathlib
          import zipfile

          dest = pathlib.Path('/tmp/minai')
          with zipfile.ZipFile('/tmp/minai.zip') as archive:
              for info in archive.infolist():
                  name = info.filename.replace('\\', '/')
                  if not name or name.endswith('/'):
                      continue
                  target = (dest / name).resolve()
                  if dest.resolve() not in target.parents and target != dest.resolve():
                      raise RuntimeError(f'Unsafe path: {info.filename}')
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(archive.read(info))
          PY

      - name: Replace repository contents
        run: |
          shopt -s dotglob
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          cp -R /tmp/minai/* .

      - name: Commit imported files
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Publish MinAI project"
          git push

