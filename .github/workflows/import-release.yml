name: Import MinAI release

on:
  push:
    paths:
      - .github/workflows/import-release.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download cleaned release package
        run: |
          curl -fsSL "https://ai.abits.top/minai-release-import.zip" -o /tmp/minai.zip
          rm -rf /tmp/minai
          mkdir -p /tmp/minai
          unzip -q /tmp/minai.zip -d /tmp/minai

      - name: Replace repository contents
        run: |
          shopt -s dotglob
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          cp -R /tmp/minai/* .

      - name: Commit imported files
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Publish MinAI project"
          git push
